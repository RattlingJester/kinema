[package]
name = "kinematics-embed"
version = "0.1.0"
edition = "2024"
description = "no_std robot kinematics library for bare-metal embedded systems."
readme = "README.md"
license = "GNU Affero General Public License version 3 "
repository = "https://github.com/RattlingJester/kinema.git"
keywords = ["kinematics", "embedded"]

[dependencies]
nalgebra = { version = "0.34.2", default-features = false, features = ["libm"] }
defmt = { version = "1.0.1", optional = true }

[features]
defmt = ["dep:defmt"]
